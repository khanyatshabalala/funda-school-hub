# Netlify Configuration
[build]
command = "npm run build"
publish = "dist/client"
functions = "netlify/functions"

# Environment variables (set these in Netlify dashboard for production)
[build.environment]
NODE_VERSION = "20"

# Headers for security and caching
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"

# Caching for static assets
[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Handle SPA routing - redirect all non-matching routes to index
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# API routes - if you have edge functions
[[redirects]]
from = "/api/*"
to = "/.netlify/functions/:splat"
status = 200
