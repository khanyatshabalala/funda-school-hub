<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Foot pad outline — draws first */
    .foot-pad {
      stroke: #ffffff;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      stroke-dasharray: 120;
      stroke-dashoffset: 120;
      animation: draw 2.4s ease-in-out infinite;
    }

    /* Toe 1 (left) */
    .toe-1 {
      stroke: #ffffff;
      stroke-width: 2.5;
      fill: none;
      stroke-dasharray: 28;
      stroke-dashoffset: 28;
      animation: draw 2.4s ease-in-out infinite;
      animation-delay: 0.5s;
    }

    /* Toe 2 (middle — accent) */
    .toe-2 {
      stroke: #38bdf8;
      stroke-width: 2.5;
      fill: none;
      stroke-dasharray: 28;
      stroke-dashoffset: 28;
      animation: draw 2.4s ease-in-out infinite;
      animation-delay: 0.7s;
    }

    /* Toe 3 (right) */
    .toe-3 {
      stroke: #ffffff;
      stroke-width: 2.5;
      fill: none;
      stroke-dasharray: 28;
      stroke-dashoffset: 28;
      animation: draw 2.4s ease-in-out infinite;
      animation-delay: 0.9s;
    }

    /* Small pinky toe */
    .toe-4 {
      stroke: #ffffff;
      stroke-width: 2;
      fill: none;
      stroke-dasharray: 20;
      stroke-dashoffset: 20;
      opacity: 0.5;
      animation: draw 2.4s ease-in-out infinite;
      animation-delay: 1.1s;
    }

    @keyframes draw {
      0%   { stroke-dashoffset: var(--len, 120); opacity: 0; }
      10%  { opacity: 1; }
      60%  { stroke-dashoffset: 0; opacity: 1; }
      85%  { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 0; }
    }
  </style>

  <!-- Foot pad: rounded teardrop shape traced as a single path -->
  <path
    class="foot-pad"
    style="--len: 120"
    d="M 60 80
       C 44 80, 34 70, 34 58
       C 34 46, 42 38, 52 36
       C 56 35, 60 35, 64 36
       C 74 38, 82 46, 82 58
       C 82 70, 72 80, 60 80 Z"
  />

  <!-- Toe 1: left -->
  <circle class="toe-1" style="--len: 28" cx="46" cy="28" r="4.5"/>

  <!-- Toe 2: middle (accent blue) -->
  <circle class="toe-2" style="--len: 28" cx="57" cy="24" r="4.5"/>

  <!-- Toe 3: right -->
  <circle class="toe-3" style="--len: 28" cx="68" cy="26" r="4.5"/>

  <!-- Toe 4: pinky -->
  <circle class="toe-4" style="--len: 20" cx="78" cy="32" r="3.5"/>
</svg>
